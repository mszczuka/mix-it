<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Clean Sweep Rush</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #1a2a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  user-select: none;
  touch-action: manipulation;
  color: #fff;
}

/* ===== CANVAS ===== */
#game-canvas {
  display: block;
  position: relative;
  z-index: 1;
}

/* ===== SCREEN OVERLAYS ===== */
.screen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(10, 18, 10, 0.88);
  z-index: 10;
  padding: 24px;
}

.screen.hidden {
  display: none;
}

/* ===== BUTTONS ===== */
.btn-primary {
  background: #44aa88;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 14px 36px;
  font-size: 18px;
  font-weight: 700;
  min-height: 52px;
  cursor: pointer;
  letter-spacing: 0.04em;
  box-shadow: 0 4px 16px rgba(68, 170, 136, 0.4);
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
}
.btn-primary:hover { background: #55cc99; box-shadow: 0 6px 20px rgba(68,170,136,0.55); }
.btn-primary:active { transform: scale(0.96); }

.btn-secondary {
  background: transparent;
  color: #aaccaa;
  border: 2px solid #44aa88;
  border-radius: 12px;
  padding: 12px 28px;
  font-size: 16px;
  font-weight: 600;
  min-height: 48px;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: background 0.15s, color 0.15s;
}
.btn-secondary:hover { background: rgba(68,170,136,0.15); color: #fff; }
.btn-secondary:active { transform: scale(0.96); }

/* ===== HUD ===== */
#hud {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 5;
  pointer-events: none;
}

#hud.hidden { display: none; }

#hud-bar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  background: rgba(0,0,0,0.45);
  padding: 6px 10px;
  gap: 8px;
}

#hud-left {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}

#hud-targets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.hud-target-card {
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 16px;
  padding: 3px 8px 3px 6px;
  font-size: 11px;
  font-weight: 600;
  min-height: 26px;
}

.hud-target-icon { font-size: 13px; line-height: 1; }
.hud-target-count { color: #fff; }

.hud-target-card.done {
  border-color: #44aa88;
  background: rgba(68,170,136,0.25);
}

#hud-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

#hud-timer {
  background: #cc7722;
  color: #fff;
  border-radius: 16px;
  padding: 4px 14px;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.03em;
  min-width: 60px;
  text-align: center;
}

#hud-timer.warning {
  background: #cc2222;
  animation: timerPulse 0.6s ease-in-out infinite alternate;
}

@keyframes timerPulse {
  from { opacity: 1; transform: scale(1); }
  to   { opacity: 0.75; transform: scale(1.07); }
}

/* ===== WATER BAR (BOTTOM HORIZONTAL) ===== */
#hud-right {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

#hud-gold {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  font-weight: 700;
  color: #ffcc44;
}

#hud-gold-icon { font-size: 14px; }

#hud-gold-value {
  transition: transform 0.15s;
}

#hud-gold-value.pulse {
  animation: goldPulse 0.3s ease;
}

@keyframes goldPulse {
  0%   { transform: scale(1); color: #ffcc44; }
  50%  { transform: scale(1.3); color: #ffee88; }
  100% { transform: scale(1); color: #ffcc44; }
}

/* Bottom water tank bar */
#water-tank-bar {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 6;
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,0,0,0.55);
  border-radius: 10px;
  padding: 5px 10px;
  width: 80%;
  max-width: 360px;
  pointer-events: none;
}

#water-tank-bar.hidden { display: none; }

#water-tank-icon {
  font-size: 16px;
  flex-shrink: 0;
}

#water-tank-track {
  flex: 1;
  height: 14px;
  background: rgba(0,0,0,0.4);
  border-radius: 7px;
  border: 1.5px solid rgba(100,180,255,0.25);
  position: relative;
  overflow: hidden;
}

#water-tank-fill {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  background: linear-gradient(to right, #2288cc, #44bbff);
  border-radius: 5px;
  transition: width 0.08s linear;
}

#water-tank-reserve-marker {
  position: absolute;
  top: -1px;
  bottom: -1px;
  width: 2px;
  background: rgba(255,80,80,0.7);
  z-index: 2;
}

#water-tank-reserve-zone {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  background: rgba(255,60,60,0.12);
  border-radius: 5px 0 0 5px;
}

/* Water bar visual states */
#water-tank-bar.low-water #water-tank-fill {
  background: linear-gradient(to right, #cc8822, #ffaa33);
  animation: waterPulseSubtle 0.7s ease-in-out infinite alternate;
}

#water-tank-bar.reserve #water-tank-fill {
  background: linear-gradient(to right, #cc2222, #ff4444);
  animation: waterPulseStrong 0.4s ease-in-out infinite alternate;
}

#water-tank-bar.locked #water-tank-fill {
  background: linear-gradient(to right, #666, #888);
  animation: none;
}

#water-tank-bar.locked #water-tank-track {
  border-color: rgba(150,150,150,0.4);
}

@keyframes waterPulseSubtle {
  from { opacity: 1; }
  to   { opacity: 0.7; }
}

@keyframes waterPulseStrong {
  from { opacity: 1; }
  to   { opacity: 0.45; }
}

#water-tank-lock-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 9px;
  font-weight: 700;
  color: #ddd;
  z-index: 3;
  text-shadow: 0 1px 2px rgba(0,0,0,0.6);
}

#water-tank-bar.locked #water-tank-lock-overlay {
  display: flex;
}

#water-tank-pct {
  font-size: 9px;
  font-weight: 700;
  color: #88ccff;
  min-width: 30px;
  text-align: right;
  flex-shrink: 0;
}

#water-tank-bar.locked #water-tank-pct {
  color: #aaa;
}

/* ===== POWERUP HUD ===== */
#powerup-hud {
  position: absolute;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  display: flex;
  gap: 10px;
  pointer-events: none;
}

#powerup-hud.hidden { display: none; }

.powerup-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(68,170,255,0.25);
  border: 2px solid rgba(68,170,255,0.7);
  border-radius: 20px;
  padding: 4px 14px 4px 10px;
  font-size: 13px;
  font-weight: 700;
  color: #88ddff;
}

.powerup-icon { font-size: 16px; }

/* ===== INTRO SCREEN ===== */
#screen-intro {
  gap: 0;
}

#intro-world-name {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #44aa88;
  margin-bottom: 6px;
}

#intro-level-number {
  font-size: 42px;
  font-weight: 900;
  color: #fff;
  letter-spacing: -0.01em;
  line-height: 1;
  margin-bottom: 4px;
}

#intro-level-subtitle {
  font-size: 18px;
  font-weight: 600;
  color: #aaccaa;
  margin-bottom: 20px;
}

#intro-targets {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 16px;
}

.intro-target-card {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 8px 14px 8px 10px;
  font-size: 13px;
  font-weight: 600;
  animation: cardBounce 0.5s ease-out;
}

@keyframes cardBounce {
  0%   { transform: translateY(18px); opacity: 0; }
  60%  { transform: translateY(-4px); opacity: 1; }
  100% { transform: translateY(0);    opacity: 1; }
}

.intro-target-icon { font-size: 18px; }
.intro-target-label { color: #cceecc; }
.intro-target-count { font-size: 16px; font-weight: 800; color: #fff; }

#intro-timer-preview {
  background: rgba(204,119,34,0.2);
  border: 1.5px solid #cc7722;
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 13px;
  font-weight: 700;
  color: #ffaa44;
  margin-bottom: 16px;
}

/* ===== BOOSTER SELECTION ON INTRO ===== */
#intro-boosters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 18px;
}

.booster-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  min-width: 80px;
  pointer-events: auto;
}
.booster-card:hover { border-color: #44aa88; background: rgba(68,170,136,0.1); }
.booster-card.selected { border-color: #44dd88; background: rgba(68,220,136,0.2); }
.booster-card.disabled { opacity: 0.4; pointer-events: none; }
.booster-card-icon { font-size: 20px; }
.booster-card-name { font-size: 10px; font-weight: 700; color: #cceecc; text-align: center; }
.booster-card-cost { font-size: 10px; font-weight: 600; color: #ffcc44; }

/* ===== RESULT SCREEN ===== */
#screen-result {
  gap: 0;
}

#result-icon {
  font-size: 56px;
  line-height: 1;
  margin-bottom: 10px;
}

#result-title {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 0.01em;
  margin-bottom: 6px;
}

#result-title.win  { color: #44dd88; }
#result-title.fail { color: #dd4444; }

#result-stars {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  font-size: 32px;
}

.star { color: #554400; transition: color 0.3s; }
.star.lit { color: #ffcc00; }

#result-summary {
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 12px 20px;
  margin-bottom: 18px;
  font-size: 13px;
  color: #aaccaa;
  text-align: center;
  min-width: 200px;
}

#result-summary .summary-row {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  padding: 2px 0;
}

#result-summary .summary-val { color: #fff; font-weight: 700; }

#result-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

/* ===== RESPONSIVE CANVAS WRAPPER ===== */
#canvas-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== HUD TARGET BOUNCE ===== */
.hud-target-card.bounce {
  animation: hudBounce 0.3s ease;
}
@keyframes hudBounce {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* ===== HOME SCREEN ===== */
#screen-home {
  gap: 0;
  justify-content: flex-start;
  padding-top: 60px;
  padding-bottom: 60px;
}

#home-title {
  font-size: 32px;
  font-weight: 900;
  color: #44dd88;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}

#home-subtitle {
  font-size: 13px;
  font-weight: 600;
  color: #88aa88;
  margin-bottom: 24px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

#home-coins {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,204,68,0.12);
  border: 1.5px solid rgba(255,204,68,0.3);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 15px;
  font-weight: 700;
  color: #ffcc44;
  margin-bottom: 28px;
}

#home-world-card {
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 18px 28px;
  text-align: center;
  margin-bottom: 28px;
  min-width: 220px;
}

#home-world-name {
  font-size: 11px;
  font-weight: 700;
  color: #44aa88;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

#home-level-display {
  font-size: 36px;
  font-weight: 900;
  color: #fff;
  margin-bottom: 4px;
}

#home-level-name {
  font-size: 14px;
  font-weight: 600;
  color: #aaccaa;
}

#btn-play {
  font-size: 20px;
  padding: 16px 60px;
  margin-top: 8px;
}

/* ===== UPGRADES SCREEN ===== */
#screen-upgrades {
  gap: 0;
  justify-content: flex-start;
  padding-top: 20px;
  padding-bottom: 60px;
  overflow-y: auto;
}

#upgrades-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 380px;
  margin-bottom: 16px;
}

#upgrades-title {
  font-size: 22px;
  font-weight: 900;
  color: #fff;
}

#upgrades-coins {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 14px;
  font-weight: 700;
  color: #ffcc44;
}

#upgrade-lanes {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 380px;
}

.upgrade-lane-card {
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.upgrade-lane-card.locked {
  opacity: 0.45;
}

.upgrade-lane-icon {
  font-size: 22px;
  width: 32px;
  text-align: center;
}

.upgrade-lane-info {
  flex: 1;
}

.upgrade-lane-name {
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 2px;
}

.upgrade-lane-detail {
  font-size: 10px;
  color: #88aa88;
}

.upgrade-lane-rank {
  font-size: 10px;
  color: #aaccaa;
  font-weight: 600;
}

.btn-upgrade {
  background: #44aa88;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-upgrade:hover { background: #55cc99; }
.btn-upgrade:active { transform: scale(0.96); }
.btn-upgrade:disabled { background: #555; cursor: default; opacity: 0.5; }

.upgrade-locked-text {
  font-size: 10px;
  color: #886644;
  font-weight: 600;
  text-align: right;
  min-width: 70px;
}

/* ===== BOTTOM NAV ===== */
#bottom-nav {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 15;
  display: flex;
  background: rgba(0,0,0,0.7);
  border-top: 1px solid rgba(255,255,255,0.1);
}

#bottom-nav.hidden { display: none; }

.nav-tab {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: #667766;
  cursor: pointer;
  transition: color 0.15s, background 0.15s;
  border: none;
  background: none;
}

.nav-tab:hover { color: #aaccaa; }
.nav-tab.active { color: #44dd88; background: rgba(68,220,136,0.08); }

.nav-tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }
</style>
</head>
<body>

<div id="canvas-wrapper">
  <!-- Game canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- HUD (gameplay overlay) -->
  <div id="hud" class="hidden">
    <div id="hud-bar">
      <div id="hud-left">
        <div id="hud-targets"></div>
      </div>
      <div id="hud-center">
        <div id="hud-timer">45</div>
      </div>
      <div id="hud-right">
        <div id="hud-gold">
          <span id="hud-gold-icon">&#x1FA99;</span>
          <span id="hud-gold-value">0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom water tank bar -->
  <div id="water-tank-bar" class="hidden">
    <span id="water-tank-icon">&#x1F4A6;</span>
    <div id="water-tank-track">
      <div id="water-tank-reserve-zone"></div>
      <div id="water-tank-fill" style="width:100%"></div>
      <div id="water-tank-reserve-marker"></div>
      <div id="water-tank-lock-overlay">&#x1F512; Recharge</div>
    </div>
    <span id="water-tank-pct">100%</span>
  </div>

  <!-- Power-up indicator -->
  <div id="powerup-hud" class="hidden"></div>

  <!-- Home screen -->
  <div id="screen-home" class="screen">
    <div id="home-title">Clean Sweep Rush</div>
    <div id="home-subtitle">Restoration Puzzle</div>
    <div id="home-coins"><span>&#x1FA99;</span> <span id="home-coins-value">200</span></div>
    <div id="home-world-card">
      <div id="home-world-name">Backyard Chaos</div>
      <div id="home-level-display">Level 1</div>
      <div id="home-level-name">First Wash</div>
    </div>
    <button class="btn-primary" id="btn-play">PLAY</button>
  </div>

  <!-- Intro screen -->
  <div id="screen-intro" class="screen hidden">
    <div id="intro-world-name">World 1</div>
    <div id="intro-level-number">Level 1</div>
    <div id="intro-level-subtitle">First Wash</div>
    <div id="intro-targets"></div>
    <div id="intro-timer-preview">45 seconds</div>
    <div id="intro-boosters"></div>
    <button class="btn-primary" id="btn-start">START</button>
  </div>

  <!-- Result screen -->
  <div id="screen-result" class="screen hidden">
    <div id="result-icon">&#x1F3C6;</div>
    <div id="result-title" class="win">Level Complete!</div>
    <div id="result-stars">
      <span class="star lit" id="star-1">&#x2605;</span>
      <span class="star lit" id="star-2">&#x2605;</span>
      <span class="star lit" id="star-3">&#x2605;</span>
    </div>
    <div id="result-summary"></div>
    <div id="result-actions"></div>
  </div>

  <!-- Upgrades screen -->
  <div id="screen-upgrades" class="screen hidden">
    <div id="upgrades-header">
      <div id="upgrades-title">Upgrades</div>
      <div id="upgrades-coins"><span>&#x1FA99;</span> <span id="upgrades-coins-value">200</span></div>
    </div>
    <div id="upgrade-lanes"></div>
  </div>

  <!-- Bottom navigation -->
  <div id="bottom-nav" class="hidden">
    <button class="nav-tab active" data-tab="home">
      <span class="nav-tab-icon">&#x1F3E0;</span>Home
    </button>
    <button class="nav-tab" data-tab="upgrades">
      <span class="nav-tab-icon">&#x2B06;&#xFE0F;</span>Upgrades
    </button>
  </div>

</div><!-- /#canvas-wrapper -->

<script>
'use strict';

// ===== CONSTANTS & CONFIG =====
const CANVAS_W = 450;
const CANVAS_H = 800;
const BOT_SPEED = 280;
const BOT_RADIUS_X = 18;
const BOT_RADIUS_Y = 12;
const CLEAN_RADIUS_X = 50;
const CLEAN_RADIUS_Y = 35;
const CLEAN_POWER = 30;
const TURBO_RADIUS_MULT = 1.5;
const TURBO_POWER_MULT = 2.0;
const SLUDGE_MAGNET_RADIUS = 120;
const COMBO_WINDOW = 2.0;
const POWERUP_BOB_SPEED = 2;
const POWERUP_BOB_AMP = 4;
const HAZARD_RESPAWN_INTERVAL = 4;
const HAZARD_RESPAWN_RADIUS = 60;
const SCREEN_SHAKE_DECAY = 0.9;

// Water tank defaults (v3: auto-regen system)
const WATER_CAPACITY_BASE = 100;
const WATER_DRAIN_RATE_BASE = 14;   // per second while spraying (hold-to-spray)
const WATER_REGEN_RATE_BASE = 10;   // per second while idle (not spraying)
const WATER_LOCKED_REGEN_RATE_BASE = 12;  // per second during locked recharge
const WATER_RESERVE_THRESHOLD_PCT = 0.20; // 20% of capacity

// ===== UTILITIES =====

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return v < min ? min : v > max ? max : v; }
function dist(ax, ay, bx, by) {
  const dx = ax - bx, dy = ay - by;
  return Math.sqrt(dx * dx + dy * dy);
}
function ellipseDist(px, py, rx, ry) {
  return Math.sqrt((px * px) / (rx * rx) + (py * py) / (ry * ry));
}
function randRange(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(randRange(min, max + 1)); }
function easeOut(t) { return 1 - (1 - t) * (1 - t); }

function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,         x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h,     x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x,     y + h,     x, y + h - r,     r);
  ctx.lineTo(x,     y + r);
  ctx.arcTo(x,     y,         x + r, y,          r);
  ctx.closePath();
}

// ===== UPGRADE EFFECT HELPERS =====

function getUpgradeMultiplier(lane) {
  const rank = progression.upgradeRanks[lane] || 0;
  const def = UPGRADE_DEFS[lane];
  return 1 + rank * def.perRank;
}

function getEffectiveCleanPower() {
  let power = CLEAN_POWER * getUpgradeMultiplier('spray_power');
  if (state.activeBooster === 'width') {
    // wide nozzle doesn't boost power, but pressure_boost would
  }
  return power;
}

function getEffectiveCleanRadiusX() {
  let r = CLEAN_RADIUS_X * getUpgradeMultiplier('spray_width');
  if (state.activeBooster === 'width') r *= 1.25;
  return r;
}

function getEffectiveCleanRadiusY() {
  let r = CLEAN_RADIUS_Y * getUpgradeMultiplier('spray_width');
  if (state.activeBooster === 'width') r *= 1.25;
  return r;
}

function getEffectiveWaterCapacity() {
  let cap = WATER_CAPACITY_BASE * getUpgradeMultiplier('tank_capacity');
  if (state.activeBooster === 'tank') cap *= 1.3;
  return cap;
}

function getEffectiveRegenRate() {
  let rate = WATER_REGEN_RATE_BASE * getUpgradeMultiplier('regen_speed');
  if (state.activeBooster === 'turbo_regen') rate *= 1.4;
  return rate;
}

function getEffectiveLockedRegenRate() {
  let rate = WATER_LOCKED_REGEN_RATE_BASE * getUpgradeMultiplier('regen_speed');
  if (state.activeBooster === 'turbo_regen') rate *= 1.4;
  return rate;
}

function getEffectiveAimLerp() {
  // Base lerp factor is 0.001; lower = more responsive.
  // Move speed upgrade makes it even more responsive (lower pow base)
  const mult = getUpgradeMultiplier('move_speed');
  return Math.pow(0.001, 1 / mult); // more responsive
}

// ===== SCREEN MANAGER =====

function showScreen(name) {
  state.screen = name;

  const home       = document.getElementById('screen-home');
  const intro      = document.getElementById('screen-intro');
  const gameplay_hud = document.getElementById('hud');
  const result     = document.getElementById('screen-result');
  const powerupHud = document.getElementById('powerup-hud');
  const upgrades   = document.getElementById('screen-upgrades');
  const bottomNav  = document.getElementById('bottom-nav');
  const waterTankBar = document.getElementById('water-tank-bar');

  // Hide all
  home.classList.add('hidden');
  intro.classList.add('hidden');
  gameplay_hud.classList.add('hidden');
  result.classList.add('hidden');
  powerupHud.classList.add('hidden');
  upgrades.classList.add('hidden');
  bottomNav.classList.add('hidden');
  waterTankBar.classList.add('hidden');

  if (name === 'home') {
    home.classList.remove('hidden');
    bottomNav.classList.remove('hidden');
    populateHomeScreen();
    updateNavTabs('home');
  } else if (name === 'upgrades') {
    upgrades.classList.remove('hidden');
    bottomNav.classList.remove('hidden');
    populateUpgradesScreen();
    updateNavTabs('upgrades');
  } else if (name === 'intro') {
    intro.classList.remove('hidden');
    populateIntroScreen();
  } else if (name === 'gameplay') {
    gameplay_hud.classList.remove('hidden');
    waterTankBar.classList.remove('hidden');
  } else if (name === 'result') {
    result.classList.remove('hidden');
    populateResultScreen();
  }
}

function updateNavTabs(activeTab) {
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.classList.toggle('active', tab.getAttribute('data-tab') === activeTab);
  });
}

// ===== UPGRADES SCREEN =====

function populateUpgradesScreen() {
  document.getElementById('upgrades-coins-value').textContent = progression.washCoins;

  const container = document.getElementById('upgrade-lanes');
  container.innerHTML = '';

  const laneKeys = ['spray_power', 'tank_capacity', 'spray_width', 'regen_speed', 'move_speed'];

  laneKeys.forEach(key => {
    const def = UPGRADE_DEFS[key];
    const currentRank = progression.upgradeRanks[key];
    const laneUnlocked = progression.campaignLevel >= def.unlockLevel;

    const card = document.createElement('div');
    card.className = 'upgrade-lane-card' + (laneUnlocked ? '' : ' locked');

    const iconEl = document.createElement('div');
    iconEl.className = 'upgrade-lane-icon';
    iconEl.textContent = def.icon;

    const infoEl = document.createElement('div');
    infoEl.className = 'upgrade-lane-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'upgrade-lane-name';
    nameEl.textContent = def.name;

    const rankEl = document.createElement('div');
    rankEl.className = 'upgrade-lane-rank';
    rankEl.textContent = 'Rank ' + currentRank + ' / 8';

    const detailEl = document.createElement('div');
    detailEl.className = 'upgrade-lane-detail';

    if (!laneUnlocked) {
      detailEl.textContent = 'Unlocks at Level ' + def.unlockLevel;
    } else {
      const currentEffect = Math.round(currentRank * def.perRank * 100);
      detailEl.textContent = 'Current: +' + currentEffect + '% | ' + def.effectLabel;
    }

    infoEl.appendChild(nameEl);
    infoEl.appendChild(rankEl);
    infoEl.appendChild(detailEl);

    card.appendChild(iconEl);
    card.appendChild(infoEl);

    if (!laneUnlocked) {
      const lockedEl = document.createElement('div');
      lockedEl.className = 'upgrade-locked-text';
      lockedEl.textContent = 'Level ' + def.unlockLevel;
      card.appendChild(lockedEl);
    } else if (currentRank >= 8) {
      const maxEl = document.createElement('div');
      maxEl.className = 'upgrade-locked-text';
      maxEl.style.color = '#44dd88';
      maxEl.textContent = 'MAX';
      card.appendChild(maxEl);
    } else {
      const nextRankDef = def.ranks[currentRank];
      const rankUnlocked = progression.campaignLevel >= nextRankDef.unlockLevel;
      const canAfford = progression.washCoins >= nextRankDef.cost;

      if (!rankUnlocked) {
        const lockedEl = document.createElement('div');
        lockedEl.className = 'upgrade-locked-text';
        lockedEl.textContent = 'Level ' + nextRankDef.unlockLevel;
        card.appendChild(lockedEl);
      } else {
        const btn = document.createElement('button');
        btn.className = 'btn-upgrade';
        btn.textContent = nextRankDef.cost + ' \u{1FA99}';
        btn.disabled = !canAfford;
        btn.addEventListener('click', () => {
          if (progression.washCoins >= nextRankDef.cost) {
            progression.washCoins -= nextRankDef.cost;
            progression.upgradeRanks[key]++;
            populateUpgradesScreen();
          }
        });
        card.appendChild(btn);
      }
    }

    container.appendChild(card);
  });
}

// Selected booster tracking for intro screen
let _selectedBoosterId = null;

function populateIntroBoosters() {
  const container = document.getElementById('intro-boosters');
  container.innerHTML = '';
  _selectedBoosterId = null;

  BOOSTER_DEFS.forEach(bdef => {
    const card = document.createElement('div');
    const canAfford = progression.washCoins >= bdef.cost;
    card.className = 'booster-card' + (canAfford ? '' : ' disabled');
    card.setAttribute('data-booster-id', bdef.id);

    card.innerHTML =
      '<span class="booster-card-icon">' + bdef.icon + '</span>' +
      '<span class="booster-card-name">' + bdef.name + '</span>' +
      '<span class="booster-card-cost">' + bdef.cost + ' \u{1FA99}</span>';

    card.addEventListener('click', () => {
      if (!canAfford) return;
      // Toggle selection
      if (_selectedBoosterId === bdef.id) {
        _selectedBoosterId = null;
        document.querySelectorAll('.booster-card').forEach(c => c.classList.remove('selected'));
      } else {
        _selectedBoosterId = bdef.id;
        document.querySelectorAll('.booster-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
      }
    });

    container.appendChild(card);
  });
}

function populateResultScreen() {
  const win     = state.won;
  const stars   = state.stars;

  const isLast  = state.levelIndex >= LEVELS.length - 1;

    titleEl.className   = 'win';
  } else if (win) {
    iconEl.textContent  = '\u{1F3C6}';

    titleEl.className   = 'win';
  } else {
    iconEl.textContent  = '\u{1F613}';

  if (win && isLast) {
    starsEl.innerHTML = '';

    msgEl.style.cssText = 'font-size:15px;color:#fff;font-weight:700;margin-bottom:6px;';
    msgEl.textContent = 'All 3 levels cleared!';
    summaryEl.appendChild(msgEl);
    const subEl = document.createElement('div');
    subEl.style.cssText = 'font-size:12px;color:#aaccaa;margin-bottom:8px;';
    subEl.textContent = 'Core loop validation ready for review.';
    summaryEl.appendChild(subEl);
    // Show coins earned
    addSummaryRow(summaryEl, 'Gold Earned', '+' + state.coinsEarnedThisLevel + ' \u{1FA99}');
    addSummaryRow(summaryEl, 'Total Gold', progression.washCoins.toString() + ' \u{1FA99}');
  } else if (win) {
    const timeBonus = Math.max(0, Math.round(state.timeLeft));
    addSummaryRow(summaryEl, 'Time Bonus', '+' + timeBonus + 's');
    addSummaryRow(summaryEl, 'Stars', '\u2605'.repeat(stars));
    addSummaryRow(summaryEl, 'Gold Earned', '+' + state.coinsEarnedThisLevel + ' \u{1FA99}');
    addSummaryRow(summaryEl, 'Total Gold', progression.washCoins.toString() + ' \u{1FA99}');
  } else {
    state.targets.forEach(t => {
      let progressStr;
      if (t.type === 'restore_object') {
        progressStr = (t.current || 0) >= 1 ? '\u2713' : '0/1';
      } else if (t.type === 'clean_area') {
        progressStr = Math.round((t.current || 0) * 100) + '% / ' + Math.round((t.threshold || 0) * 100) + '%';
      } else {
        progressStr = (t.current || 0) + ' / ' + (t.amount || 1);
      }
      addSummaryRow(summaryEl, t.label, progressStr);
    });
    addSummaryRow(summaryEl, 'Status', "Time's up!");
    if (state.coinsEarnedThisLevel > 0) {
      addSummaryRow(summaryEl, 'Gold Kept (50%)', '+' + state.coinsEarnedThisLevel + ' \u{1FA99}');
    }
  }

  // Action buttons
  actionsEl.innerHTML = '';

  if (win && isLast) {
    const btnHome = document.createElement('button');
    btnHome.className   = 'btn-primary';
    btnHome.textContent = 'Home';
    btnHome.addEventListener('click', () => {
      state.levelIndex = 0;
      showScreen('home');
    });
    actionsEl.appendChild(btnHome);

  } else if (win) {
    const btnNext = document.createElement('button');
    btnNext.className   = 'btn-primary';
    btnNext.textContent = 'Next Level';
    btnNext.addEventListener('click', () => {
      state.levelIndex++;
      showScreen('intro');
    });
    actionsEl.appendChild(btnNext);

    const btnHome = document.createElement('button');
    btnHome.className   = 'btn-secondary';
    btnHome.textContent = 'Home';
    btnHome.addEventListener('click', () => {
      showScreen('home');
    });
    actionsEl.appendChild(btnHome);

  } else {
    const btnRetry = document.createElement('button');
    btnRetry.className   = 'btn-primary';
    btnRetry.textContent = 'Retry';
    btnRetry.addEventListener('click', () => {
      startLevel();
    });
    actionsEl.appendChild(btnRetry);

    const btnHome = document.createElement('button');
    btnHome.className   = 'btn-secondary';
    btnHome.textContent = 'Home';
    btnHome.addEventListener('click', () => {
      showScreen('home');
    });
    actionsEl.appendChild(btnHome);
  }
}

  row.innerHTML =

    '<span class="summary-val">' + value + '</span>';
  container.appendChild(row);
}

// ===== BOT CONTROLLER =====

const canvas = document.getElementById('game-canvas');

function canvasCoords(clientX, clientY) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width;
  const scaleY = CANVAS_H / rect.height;
  return {
    x: clamp((clientX - rect.left) * scaleX, 0, CANVAS_W),
    y: clamp((clientY - rect.top)  * scaleY, 0, CANVAS_H),
  };
}

// Mouse events
canvas.addEventListener('mousemove', (e) => {
  if (state.screen !== 'gameplay') return;
  const c = canvasCoords(e.clientX, e.clientY);
  state.targetX = c.x;
  state.targetY = c.y;
  state.inputActive = true;
});

canvas.addEventListener('mousedown', (e) => {
  if (state.screen !== 'gameplay') return;
  const c = canvasCoords(e.clientX, e.clientY);
  state.targetX = c.x;
  state.targetY = c.y;
  state.inputActive = true;
});

canvas.addEventListener('mouseup',    () => { /* nozzle: inputActive stays true while over canvas */ });
canvas.addEventListener('mouseleave', () => { state.inputActive = false; });

// Touch events
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (state.screen !== 'gameplay') return;
  const t = e.touches[0];
  const c = canvasCoords(t.clientX, t.clientY);
  state.targetX = c.x;
  state.targetY = c.y;
  state.inputActive = true;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (state.screen !== 'gameplay') return;
  const t = e.touches[0];
  const c = canvasCoords(t.clientX, t.clientY);
  state.targetX = c.x;
  state.targetY = c.y;
}, { passive: false });

canvas.addEventListener('touchend',    () => { state.inputActive = false; });
canvas.addEventListener('touchcancel', () => { state.inputActive = false; });

function updateBot(dt) {
  if (state.paused) return;

  // Bot position is fixed at bottom-center
  state.botX = CANVAS_W / 2;
  state.botY = CANVAS_H - 50;

  // Lerp aim point toward input target (upgrade affects responsiveness)
  const lerpBase = getEffectiveAimLerp();
  const t = 1 - Math.pow(lerpBase, dt);
  state.aimX = lerp(state.aimX, state.targetX, t);
  state.aimY = lerp(state.aimY, state.targetY, t);

  // Clamp aim within arena bounds
  const margin = 20;
  state.aimX = clamp(state.aimX, margin, CANVAS_W - margin);
  state.aimY = clamp(state.aimY, margin, CANVAS_H - margin);
}

// ===== RENDERER =====

const ctx = canvas.getContext('2d');

/** Resize canvas to maintain 9:16 portrait aspect ratio, centered in viewport */
function resizeCanvas() {
  const ww = window.innerWidth;
  const wh = window.innerHeight;

  const aspect = CANVAS_W / CANVAS_H; // 9/16 = 0.5625
  let displayW, displayH;

  if (ww / wh > aspect) {
    displayH = wh;
    displayW = displayH * aspect;
  } else {
    displayW = ww;
    displayH = displayW / aspect;
  }

  canvas.style.width  = displayW + 'px';
  canvas.style.height = displayH + 'px';
  canvas.width  = CANVAS_W;
  canvas.height = CANVAS_H;

  const wrapper = document.getElementById('canvas-wrapper');
  wrapper.style.width  = displayW + 'px';
  wrapper.style.height = displayH + 'px';

  document.documentElement.style.setProperty('--scale', (displayW / CANVAS_W).toFixed(3));
}

function render() {
  ctx.save();
  ctx.translate(state.shakeX, state.shakeY);

  drawArena();
  renderProps();
  renderDirt();
  renderLocks();
  renderObjects();
  renderHazards();
  renderPowerUps();
  drawSplashCircle();
  drawBot();
  renderParticles();

  ctx.restore();
}

function drawArena() {
  const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  grad.addColorStop(0,   '#3a6a2a');
  grad.addColorStop(0.5, COL_GRASS);
  grad.addColorStop(1,   '#4a8a3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth   = 1;
  for (let i = 0; i < CANVAS_H; i += 18) {
    ctx.beginPath();
    ctx.moveTo(0,       i);
    ctx.lineTo(CANVAS_W, i);
    ctx.stroke();
  }
  ctx.restore();

  drawFence();
}

function drawFence() {
  const FENCE_THICKNESS  = 10;
  const POST_SIZE        = 14;
  const POST_HALF        = POST_SIZE / 2;
  const POST_SPACING     = 60;

  ctx.fillStyle = COL_FENCE;
  ctx.fillRect(0, 0, CANVAS_W, FENCE_THICKNESS);
  ctx.fillRect(0, CANVAS_H - FENCE_THICKNESS, CANVAS_W, FENCE_THICKNESS);
  ctx.fillRect(0, 0, FENCE_THICKNESS, CANVAS_H);
  ctx.fillRect(CANVAS_W - FENCE_THICKNESS, 0, FENCE_THICKNESS, CANVAS_H);

  ctx.fillStyle = '#a09070';
  for (let x = 0; x <= CANVAS_W; x += POST_SPACING) {
    roundRect(ctx, x - POST_HALF, 0, POST_SIZE, POST_SIZE + 5, 3);
    ctx.fill();
    roundRect(ctx, x - POST_HALF, CANVAS_H - POST_SIZE - 5, POST_SIZE, POST_SIZE + 5, 3);
    ctx.fill();
  }
  for (let y = 0; y <= CANVAS_H; y += POST_SPACING) {
    roundRect(ctx, 0, y - POST_HALF, POST_SIZE + 5, POST_SIZE, 3);
    ctx.fill();
    roundRect(ctx, CANVAS_W - POST_SIZE - 5, y - POST_HALF, POST_SIZE + 5, POST_SIZE, 3);
    ctx.fill();
  }
}

function drawBot() {
  const x  = state.botX;
  const y  = state.botY;

  const hasTurbo  = state.activePowerUps.some(p => p.type === 'turbo');
  const glowMult  = hasTurbo ? 2.2 : 1.0;

  const aimAngle = Math.atan2(state.aimY - y, state.aimX - x);

  let recoilX = 0, recoilY = 0;
  if (state.isCleaning && state.inputActive && state.waterCurrent > 0 && !state.isLockedRecharge) {
    recoilX = (Math.random() - 0.5) * 3;
    recoilY = (Math.random() - 0.5) * 3;
  }

  const glowGrad = ctx.createRadialGradient(x, y, 0, x, y, 38 * glowMult);
  glowGrad.addColorStop(0,   hasTurbo ? 'rgba(68,210,255,0.45)' : COL_BOT_GLOW);
  glowGrad.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.ellipse(x, y, 38 * glowMult, 28 * glowMult, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(x + 3, y + BOT_RADIUS_Y + 4, BOT_RADIUS_X - 2, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.translate(x + recoilX, y + recoilY);
  ctx.rotate(aimAngle + Math.PI / 2);

  const bw = BOT_RADIUS_X * 2;
  const bh = BOT_RADIUS_Y * 2.8;

  const topH  = 10;
  const sideH = bh - topH;
  const topColor = hasTurbo ? '#88eeff' : '#66ccff';
  ctx.fillStyle = topColor;
  roundRect(ctx, -bw / 2, -bh / 2, bw, topH, 6);
  ctx.fill();

  ctx.fillStyle = hasTurbo ? '#22aaee' : COL_BOT;
  roundRect(ctx, -bw / 2, -bh / 2 + topH - 2, bw, sideH, 6);
  ctx.fill();

  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.fillStyle   = '#ffffff';
  roundRect(ctx, -bw / 2 + 5, -bh / 2 + 3, bw * 0.35, topH - 2, 3);
  ctx.fill();
  ctx.restore();

  const nozzleW = 8;
  const nozzleH = 12;
  const hasWater = state.waterCurrent > 0 && !state.isLockedRecharge;
  const nozzleColor = (state.inputActive && hasWater)
    ? (hasTurbo ? '#44ffff' : '#88ccff')
    : (hasTurbo ? '#22aadd' : '#5599cc');
  ctx.fillStyle = nozzleColor;
  roundRect(ctx, -nozzleW / 2, -bh / 2 - nozzleH + 2, nozzleW, nozzleH, 3);
  ctx.fill();

  if (state.inputActive && hasWater) {
    ctx.save();
    ctx.globalAlpha = 0.6 + 0.3 * Math.sin(Date.now() * 0.01);
    const nGrad = ctx.createRadialGradient(0, -bh / 2 - nozzleH / 2, 0, 0, -bh / 2 - nozzleH / 2, 12);
    nGrad.addColorStop(0, hasTurbo ? 'rgba(68,255,255,0.6)' : 'rgba(130,200,255,0.5)');
    nGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = nGrad;
    ctx.beginPath();
    ctx.arc(0, -bh / 2 - nozzleH / 2, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.fillStyle = hasTurbo ? '#004488' : '#1155aa';
  ctx.beginPath();
  ctx.arc(-7, 4, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(7, 4, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = hasTurbo ? '#44ffff' : COL_SPRAY;
  ctx.beginPath();
  ctx.arc(-7, 4, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(7, 4, 2.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  if (hasTurbo) {
    ctx.save();
    ctx.strokeStyle = '#44ffff';
    ctx.lineWidth   = 2.5;
    ctx.globalAlpha = 0.7 + 0.3 * Math.sin(Date.now() * 0.008);
    ctx.beginPath();
    ctx.ellipse(x, y, BOT_RADIUS_X + 6, BOT_RADIUS_Y + 5, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function drawSplashCircle() {
  if (!state.inputActive) return;
  if (state.waterCurrent <= 0 || state.isLockedRecharge) return; // no water or locked = no splash

  const ax = state.aimX;
  const ay = state.aimY;
  const hasTurbo = state.activePowerUps.some(p => p.type === 'turbo');
  const crX = getEffectiveCleanRadiusX() * (hasTurbo ? TURBO_RADIUS_MULT : 1);
  const crY = getEffectiveCleanRadiusY() * (hasTurbo ? TURBO_RADIUS_MULT : 1);

  const pulse = 1 + 0.06 * Math.sin(Date.now() * 0.006);
  const pcrX = crX * pulse;
  const pcrY = crY * pulse;

  ctx.save();

  ctx.globalAlpha = 0.12;
  ctx.fillStyle = hasTurbo ? '#44ddff' : '#44aaff';
  ctx.beginPath();
  ctx.ellipse(ax, ay, pcrX, pcrY, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 0.45;
  ctx.setLineDash([5, 5]);
  ctx.strokeStyle = hasTurbo ? 'rgba(68,220,255,0.7)' : 'rgba(68,170,255,0.5)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.ellipse(ax, ay, pcrX, pcrY, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();

  if (state.screen === 'gameplay' && !state.paused) {
    const splashCount = randInt(1, 2);
    for (let i = 0; i < splashCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = randRange(20, 50);
      spawnParticle({
        x:       ax + Math.cos(angle) * randRange(2, 8),
        y:       ay + Math.sin(angle) * randRange(2, 8),
        vx:      Math.cos(angle) * speed,
        vy:      Math.sin(angle) * speed,
        life:    randRange(0.15, 0.25),
        size:    randRange(1, 3),
        color:   'rgba(180,220,255,0.7)',
        type:    'dot',
        gravity: randRange(20, 40),
        friction: 0.92,
        shrink:  true,
      });
    }
  }
}

function updateStream() {
  if (!state.inputActive) return;
  if (state.waterCurrent <= 0 || state.isLockedRecharge) return; // no water or locked = no stream
  if (state.screen !== 'gameplay' || state.paused) return;

  const fromX = state.botX;
  const fromY = state.botY;
  const toX   = state.aimX;
  const toY   = state.aimY;

  const dx = toX - fromX;
  const dy = toY - fromY;
  const distance = Math.sqrt(dx * dx + dy * dy);
  if (distance < 5) return;

  const travelTime = randRange(0.25, 0.35);

  const distRatio = clamp(distance / 500, 0, 1);
  const gravity = 20 + distRatio * 400;

  const baseVx = dx / travelTime;
  const baseVy = dy / travelTime - 0.5 * gravity * travelTime;

  const count = randInt(3, 5);
  for (let i = 0; i < count; i++) {
    const speedMult = randRange(0.9, 1.1);
    const angleJitter = (Math.random() - 0.5) * 0.16;
    const cos_j = Math.cos(angleJitter);
    const sin_j = Math.sin(angleJitter);
    const jVx = (baseVx * cos_j - baseVy * sin_j) * speedMult;
    const jVy = (baseVx * sin_j + baseVy * cos_j) * speedMult;

    spawnParticle({
      x:       fromX + (dx / distance) * 10,
      y:       fromY + (dy / distance) * 10,
      vx:      jVx,
      vy:      jVy,
      life:    travelTime * randRange(0.95, 1.05),
      size:    randRange(2, 4),
      color:   COL_SPRAY,
      type:    'dot',
      gravity: gravity,
      friction: 0.99,
      shrink:  false,
    });
  }
}

// ===== WATER TANK UPDATE (v3: auto-regen with reserve lock) =====

function updateWater(dt) {
  if (state.paused) return;

  const isSpraying = state.isCleaning && state.inputActive && !state.isLockedRecharge;

  if (isSpraying) {
    // Drain water while actively spraying
    state.waterCurrent -= state.waterDrainRate * dt;
    if (state.waterCurrent <= 0) {
      state.waterCurrent = 0;
      // Trigger reserve lock
      state.isLockedRecharge = true;
    }
  } else if (state.isLockedRecharge) {
    // Locked recharge: regen at locked rate until full
    state.waterCurrent += getEffectiveLockedRegenRate() * dt;
    if (state.waterCurrent >= state.waterCapacity) {
      state.waterCurrent = state.waterCapacity;
      state.isLockedRecharge = false;
    }
  } else {
    // Normal idle regen
    if (state.waterCurrent < state.waterCapacity) {
      state.waterCurrent += getEffectiveRegenRate() * dt;
      if (state.waterCurrent > state.waterCapacity) {
        state.waterCurrent = state.waterCapacity;
      }
    }
  }
}

function updateWaterHUD() {
  const bar = document.getElementById('water-tank-bar');
  const fillEl = document.getElementById('water-tank-fill');
  const pctEl = document.getElementById('water-tank-pct');
  const reserveZone = document.getElementById('water-tank-reserve-zone');
  const reserveMarker = document.getElementById('water-tank-reserve-marker');
  if (!fillEl || !bar) return;

  const pct = (state.waterCurrent / state.waterCapacity) * 100;
  const reservePct = (state.waterReserveThreshold / state.waterCapacity) * 100;

  fillEl.style.width = pct + '%';
  pctEl.textContent = Math.round(pct) + '%';

  // Position reserve zone and marker
  reserveZone.style.width = reservePct + '%';
  reserveMarker.style.left = reservePct + '%';

  // Visual state classes
  bar.classList.remove('low-water', 'reserve', 'locked');
  if (state.isLockedRecharge) {
    bar.classList.add('locked');
  } else if (pct <= reservePct) {
    bar.classList.add('reserve');
  } else if (pct <= WATER_LOW_WARNING_PCT * 100) {
    bar.classList.add('low-water');
  }
}

// ===== GAME LOOP =====

let lastTime = 0;

function gameLoop(timestamp) {
  const rawDt = (timestamp - lastTime) / 1000;
  lastTime    = timestamp;
  const dt    = Math.min(rawDt, 0.05);

  if (state.screen === 'gameplay' && !state.paused) {
    updateBot(dt);
    updateStream();
    updateShake(dt);
    updateDirt(dt);
    updateObjects(dt);
    updateLocks(dt);
    updatePowerUps(dt);
    updateHazards(dt);
    updateCombo(dt);
    updateParticles(dt);
    updateWater(dt);
    updateWaterHUD();
    updateHUD();
    updateSpraySound();
    updateTimerTick();
    updateTimer(dt);
    checkWinCondition();
  }

  render();
  requestAnimationFrame(gameLoop);
}

function updateShake(dt) {
  const decay = Math.pow(SCREEN_SHAKE_DECAY, dt * 60);
  state.shakeX *= decay;
  state.shakeY *= decay;
  if (Math.abs(state.shakeX) < 0.1) state.shakeX = 0;
  if (Math.abs(state.shakeY) < 0.1) state.shakeY = 0;
}

function triggerShake(intensity) {
  state.shakeX = (Math.random() * 2 - 1) * intensity;
  state.shakeY = (Math.random() * 2 - 1) * intensity;
}

// ===== INIT =====

function startLevel() {
  const level = LEVELS[state.levelIndex];
  if (!level) return;

  // Apply booster if selected
  state.activeBooster = null;
  if (_selectedBoosterId) {
    const bdef = BOOSTER_DEFS.find(b => b.id === _selectedBoosterId);
    if (bdef && progression.washCoins >= bdef.cost) {
      progression.washCoins -= bdef.cost;
      state.activeBooster = bdef.effect;
    }
    _selectedBoosterId = null;
  }

  // Calculate effective water capacity
  const effectiveCap = getEffectiveWaterCapacity();

  // Timer with booster
  let levelTimer = level.timer;
  if (state.activeBooster === 'time') levelTimer += 10;

  // Reset state
  state.timer        = levelTimer;
  state.timerElapsed = 0;
  state.paused       = false;
  state.botX         = CANVAS_W / 2;
  state.botY         = CANVAS_H - 50;
  state.aimX         = CANVAS_W / 2;
  state.aimY         = CANVAS_H / 2;
  state.targetX      = CANVAS_W / 2;
  state.targetY      = CANVAS_H / 2;
  state.inputActive  = false;

  state.dirtNodes      = [];
  state.objects        = [];
  state.locks          = [];
  state.hazards        = [];
  state.powerUps       = [];
  state.activePowerUps = [];
  state.targets        = level.targets.map(t => Object.assign({}, t, { current: 0, progress: 0, done: false }));

  state.comboCount  = 0;
  state.comboTimer  = 0;
  state.particles   = [];
  state.shakeX      = 0;
  state.shakeY      = 0;

  state.won      = false;
  state.timeLeft = levelTimer;
  state.stars    = 0;
  state.usedContinue = false;
  state.coinsEarnedThisLevel = 0;
  state.levelGold = 0;
  state.lastDirtGoldTime = 0;

  state.isCleaning = false;

  // Water (v3: auto-regen with reserve lock)
  state.waterCapacity        = effectiveCap;
  state.waterCurrent         = effectiveCap;
  state.waterDrainRate       = WATER_DRAIN_RATE_BASE;
  state.waterRegenRate       = getEffectiveRegenRate();
  state.waterLockedRegenRate = getEffectiveLockedRegenRate();
  state.waterReserveThreshold = effectiveCap * WATER_RESERVE_THRESHOLD_PCT;
  state.isLockedRecharge     = false;

  // Stop any active spray noise
  if (state.sprayNode) {
    try {
      state.sprayNode.gain.gain.setValueAtTime(0, state.sprayNode.gain.context.currentTime);
      state.sprayNode.source.stop();
    } catch (e) {}
    state.sprayNode = null;
  }

  loadLevel(level);
  showScreen('gameplay');
}

// ===== DIRT SYSTEM =====

function spawnDirt(defs) {
  const typeDefaults = {
    sludge: { radiusX: 28, radiusY: 18, maxHP: 100 },
    leaves: { radiusX: 18, radiusY: 12, maxHP: 30  },
    mud:    { radiusX: 24, radiusY: 16, maxHP: 60  },
  };

  defs.forEach((def, i) => {
    const type     = def.type || 'mud';
    const defaults = typeDefaults[type] || typeDefaults.mud;
    const maxHP    = def.maxHP !== undefined ? def.maxHP : defaults.maxHP;
    const node = {
      id:        def.id !== undefined ? def.id : (state.dirtNodes.length + i),
      x:         def.x,
      y:         def.y,
      type:      type,
      radiusX:   def.radiusX  !== undefined ? def.radiusX  : defaults.radiusX,
      radiusY:   def.radiusY  !== undefined ? def.radiusY  : defaults.radiusY,
      maxHP:     maxHP,
      hp:        maxHP,
      areaId:    def.areaId   || null,
      targetTag: def.targetTag || null,
      locked:    def.locked   || false,
      alive:     true,
    };
    state.dirtNodes.push(node);
  });
}

function updateDirt(dt) {
  if (state.paused) return;

  const aimX = state.aimX;
  const aimY = state.aimY;

  const hasTurbo  = state.activePowerUps.some(p => p.type === 'turbo');
  const hasMagnet = state.activePowerUps.some(p => p.type === 'magnet');
  const powerMult = hasTurbo ? TURBO_POWER_MULT : 1.0;
  const radiusMult = hasTurbo ? TURBO_RADIUS_MULT : 1.0;

  state.isCleaning = false;

  if (!state.inputActive) return;
  if (state.waterCurrent <= 0 || state.isLockedRecharge) return; // No water or locked = no cleaning

  const effectiveCleanPower = getEffectiveCleanPower();
  const effectiveCRX = getEffectiveCleanRadiusX();
  const effectiveCRY = getEffectiveCleanRadiusY();

  state.dirtNodes.forEach(dirt => {
    if (!dirt.alive || dirt.locked) return;

    let crX = effectiveCRX * radiusMult;
    let crY = effectiveCRY * radiusMult;

    if (dirt.type === 'sludge' && hasMagnet) {
      crX = Math.max(crX, SLUDGE_MAGNET_RADIUS);
      crY = Math.max(crY, SLUDGE_MAGNET_RADIUS);
    }

    const ed = ellipseDist(dirt.x - aimX, dirt.y - aimY, crX, crY);
    if (ed > 1) return;

    let cleanAmount = effectiveCleanPower * powerMult * dt;

    if (dirt.type === 'sludge' && !hasMagnet) {
      cleanAmount *= 0.4;
    } else if (dirt.type === 'leaves') {
      cleanAmount *= 1.5;
    }

    dirt.hp -= cleanAmount;
    state.isCleaning = true;

    if (Math.random() < 0.3) {
      spawnSprayParticle(aimX, aimY, dirt.x, dirt.y, dirt.type);
    }

    if (dirt.hp <= 0) {
      dirt.hp    = 0;
      dirt.alive = false;
      onDirtCleared(dirt);
    }
  });
}

function onDirtCleared(dirt) {
  spawnRevealPulse(dirt.x, dirt.y);

  // Award gold for dirt clearing (+1, batched every 0.5s to avoid clutter)
  const now = Date.now();
  if (now - state.lastDirtGoldTime >= 500) {
    state.lastDirtGoldTime = now;
    awardLevelGold(1, dirt.x, dirt.y);
  } else {
    // Still award the gold, just skip the floating text
    state.levelGold += 1;
    updateGoldHUD();
  }

  if (dirt.targetTag) {
    state.targets.forEach(target => {
      if (target.type === 'clean_dirt' && target.dirtTag === dirt.targetTag) {
        target.current = (target.current || 0) + 1;
        if (target.current >= target.amount) {
          target.done = true;
        }
      }
    });
  }

  checkAreaTargets();
  onCleanForCombo();

  state.objects && state.objects.forEach(obj => {
    if (!obj.restoreRequired || obj.restoreReady) return;
    const nearby = state.dirtNodes.filter(d =>
      d.type === 'sludge' && dist(d.x, d.y, obj.x, obj.y) <= 80
    );
    const allCleared = nearby.length === 0 || nearby.every(d => !d.alive);
    if (allCleared) {
      obj.restoreReady = true;
      spawnRevealPulse(obj.x, obj.y);
    }
  });
}

function checkAreaTargets() {
  state.targets.forEach(target => {
    if (target.type !== 'clean_area') return;

    const areaId = target.areaId || null;
    const allDirt = areaId
      ? state.dirtNodes.filter(d => d.areaId === areaId)
      : state.dirtNodes;

    const total   = allDirt.length;
    const cleared = allDirt.filter(d => !d.alive).length;

    target.current = total > 0 ? cleared / total : 0;

    if (target.threshold !== undefined && target.current >= target.threshold) {
      target.done = true;
    }
  });
}

// ===== DIRT RENDERER =====

function renderDirt() {
  state.dirtNodes.forEach(dirt => {
    if (!dirt.alive) return;

    const ratio    = dirt.hp / dirt.maxHP;
    const currentRX = dirt.radiusX * (0.3 + 0.7 * ratio);
    const currentRY = dirt.radiusY * (0.3 + 0.7 * ratio);
    let alpha       = 0.3 + 0.7 * ratio;
    if (dirt.locked) alpha *= 0.5;

    const x = dirt.x;
    const y = dirt.y;

    let color;
    switch (dirt.type) {
      case 'mud':    color = COL_MUD;    break;
      case 'leaves': color = COL_LEAVES; break;
      case 'sludge': color = COL_SLUDGE; break;
      default:       color = COL_MUD;
    }

    ctx.save();

    if (ratio < 0.8) {
      ctx.globalAlpha = (1 - ratio / 0.8) * 0.6;
      ctx.fillStyle   = COL_GRASS_CLEAN;
      ctx.beginPath();
      ctx.ellipse(x, y, currentRX + 4, currentRY + 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = alpha * 0.6;
    ctx.fillStyle   = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(x, y + currentRY * 0.35, currentRX * 0.9, currentRY * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = alpha;
    ctx.fillStyle   = color;
    ctx.beginPath();
    ctx.ellipse(x, y, currentRX, currentRY, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  });
}
