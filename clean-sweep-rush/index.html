// ===== PARTICLE SYSTEM =====

function spawnParticle(props) {
  const maxLife = props.life || 0.5;
  state.particles.push({
    x:       props.x       || 0,
    y:       props.y       || 0,
    vx:      props.vx      !== undefined ? props.vx : 0,
    vy:      props.vy      !== undefined ? props.vy : 0,
    life:    maxLife,
    maxLife: maxLife,
    size:    props.size    !== undefined ? props.size : 3,
    color:   props.color   || COL_SPRAY,
    type:    props.type    || 'dot',
    text:    props.text    || '',
    shrink:  props.shrink  !== undefined ? props.shrink : true,
    gravity: props.gravity !== undefined ? props.gravity : 0,
    friction:props.friction !== undefined ? props.friction : 1,
  });
}

function spawnSprayParticle(fromX, fromY, toX, toY, dirtType) {
  const baseAngle = Math.atan2(toY - fromY, toX - fromX);
  const spread    = (Math.random() - 0.5) * 1.0;
  const angle     = baseAngle + spread;
  const speed     = randRange(60, 120);

  const spawnX = fromX + Math.cos(baseAngle) * 15;
  const spawnY = fromY + Math.sin(baseAngle) * 15;

  let color;
  if (dirtType === 'sludge') {
    const r = randInt(30, 60);
    const g = randInt(30, 50);
    const b = randInt(20, 30);
    color = 'rgba(' + r + ',' + g + ',' + b + ',0.8)';
  } else {
    color = COL_SPRAY;
  }

  spawnParticle({
    x:    spawnX,
    y:    spawnY,
    vx:   Math.cos(angle) * speed,
    vy:   Math.sin(angle) * speed,
    life: randRange(0.2, 0.4),
    size: randRange(2, 4),
    color: color,
    type: 'dot',
    friction: 0.85,
  });
}

function spawnRevealPulse(x, y) {
  spawnParticle({
    x:      x,
    y:      y,
    life:   0.5,
    size:   5,
    color:  'rgba(255,255,255,0.9)',
    type:   'ring',
    shrink: false,
  });
  playDirtClearPop();
}

function spawnSparkleBurst(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    const speed = randRange(40, 100);
    const r = 255;
    const g = randInt(200, 255);
    const b = randInt(50, 150);
    spawnParticle({
      x:       x,
      y:       y,
      vx:      Math.cos(angle) * speed,
      vy:      Math.sin(angle) * speed,
      life:    randRange(0.4, 0.8),
      size:    randRange(2, 5),
      color:   'rgba(' + r + ',' + g + ',' + b + ',0.9)',
      type:    'dot',
      gravity: 80,
      friction: 0.92,
    });
  }
}

function spawnPowerUpCollectEffect(x, y, type) {
  const isTurbo = type === 'turbo';
  const ringColor = isTurbo ? 'rgba(68,170,255,0.9)' : 'rgba(255,150,50,0.9)';
  const dotColor  = isTurbo ? 'rgba(68,170,255,0.8)' : 'rgba(255,150,50,0.8)';

  spawnParticle({
    x: x, y: y,
    life: 0.6, size: 10,
    color: ringColor, type: 'ring', shrink: false,
  });

  for (let i = 0; i < 16; i++) {
    const angle = (i / 16) * Math.PI * 2;
    const speed = randRange(50, 110);
    spawnParticle({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: randRange(0.4, 0.7),
      size: randRange(2, 5),
      color: dotColor, type: 'dot',
      gravity: 60, friction: 0.9,
    });
  }
}

function onCleanForCombo() {
  if (state.comboTimer > 0) {
    state.comboCount++;
  } else {
    state.comboCount = 1;
  }
  state.comboTimer = COMBO_WINDOW;

  if (state.comboCount >= 2) {
    const label = 'x' + state.comboCount;
    const size  = 14 + state.comboCount * 2;
    spawnParticle({
      x:    state.aimX + randRange(-20, 20),
      y:    state.aimY - 20,
      vx:   randRange(-10, 10),
      vy:   -30,
      life: 0.8,
      size: size,
      color: 'rgba(255,220,50,0.95)',
      type: 'text',
      text: label,
      shrink: false,
    });
    playComboSound();
  }
}

// ===== LOCK SYSTEM =====

function spawnLocks(defs) {
  defs.forEach((def, i) => {
    const lock = {
      id:                def.id !== undefined ? def.id : (state.locks.length + i),
      x:                 def.x,
      y:                 def.y,
      width:             def.width  !== undefined ? def.width  : 80,
      height:            def.height !== undefined ? def.height : 10,
      requiredDirtCleared: def.requiredDirtCleared || [],
      unlocksDirt:       def.unlocksDirt    || [],
      unlocksObjects:    def.unlocksObjects || [],
      open:              false,
      dissolveProgress:  0,
    };
    state.locks.push(lock);
  });
}

function updateLocks(dt) {
  if (state.paused) return;

  state.locks.forEach(lock => {
    if (lock.open) {
      lock.dissolveProgress = Math.min(1, lock.dissolveProgress + dt * 2);
    } else {
      const allCleared = lock.requiredDirtCleared.every(dirtId => {
        const dirt = state.dirtNodes.find(d => d.id === dirtId);
        return dirt && !dirt.alive;
      });

      if (allCleared && lock.requiredDirtCleared.length > 0) {
        lock.open = true;

        lock.unlocksDirt.forEach(dirtId => {
          const dirt = state.dirtNodes.find(d => d.id === dirtId);
          if (dirt) dirt.locked = false;
        });

        lock.unlocksObjects.forEach(objId => {
          const obj = state.objects.find(o => o.id === objId);
          if (obj) obj.locked = false;
        });

        triggerShake(3);
        spawnRevealPulse(lock.x, lock.y);
      }
    }
  });
}

function renderLocks() {
  state.locks.forEach(lock => {
    if (lock.dissolveProgress >= 1) return;

    const alpha = 1 - lock.dissolveProgress;
    const x     = lock.x - lock.width / 2;
    const y     = lock.y - lock.height / 2;
    const w     = lock.width;
    const h     = lock.height;

    ctx.save();
    ctx.globalAlpha = alpha;

    ctx.fillStyle = '#8a6430';
    ctx.fillRect(x, y, w, h);

    ctx.strokeStyle = '#5a3c18';
    ctx.lineWidth   = 1.5;
    ctx.strokeRect(x, y, w, h);

    ctx.fillStyle = '#a07840';
    const postW   = 6;
    const postH   = h + 8;
    const postY   = y - 4;
    for (let px = x; px < x + w; px += 12) {
      ctx.fillRect(px, postY, postW, postH);
    }

    if (!lock.open) {
      ctx.font        = '14px sans-serif';
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle   = '#ffffff';
      ctx.fillText('\u{1F512}', lock.x, lock.y);
    }

    ctx.restore();
  });
}

// ===== POWER-UP SYSTEM =====

function spawnPowerUpDefs(defs) {
  defs.forEach((def, i) => {
    const pu = {
      id:         def.id !== undefined ? def.id : (state.powerUps.length + i),
      x:          def.x,
      y:          def.y,
      type:       def.type || 'turbo',
      spawnAfter: def.spawnAfter || 0,
      duration:   def.duration   || 8,
      visible:    false,
      collected:  false,
      bobOffset:  Math.random() * Math.PI * 2,
    };
    state.powerUps.push(pu);
  });
}

function updatePowerUps(dt) {
  if (state.paused) return;

  state.powerUps.forEach(pu => {
    if (pu.visible || pu.collected) return;
    if (state.timerElapsed >= pu.spawnAfter) {
      pu.visible = true;
      spawnRevealPulse(pu.x, pu.y);
    }
  });

  const aimX = state.aimX;
  const aimY = state.aimY;
  state.powerUps.forEach(pu => {
    if (!pu.visible || pu.collected) return;
    if (dist(aimX, aimY, pu.x, pu.y) < 30) {
      pu.collected = true;
      pu.visible   = false;
      state.activePowerUps.push({ type: pu.type, remaining: pu.duration });
      triggerShake(3);
      spawnPowerUpCollectEffect(pu.x, pu.y, pu.type);
      playPowerUpCollect();
    }
  });

  for (let i = state.activePowerUps.length - 1; i >= 0; i--) {
    state.activePowerUps[i].remaining -= dt;
    if (state.activePowerUps[i].remaining <= 0) {
      state.activePowerUps.splice(i, 1);
    }
  }

  const hudEl = document.getElementById('powerup-hud');
  if (!hudEl) return;

  if (state.activePowerUps.length === 0) {
    hudEl.classList.add('hidden');
  } else {
    hudEl.classList.remove('hidden');
    hudEl.innerHTML = '';
    state.activePowerUps.forEach(ap => {
      const indicator = document.createElement('div');
      indicator.className = 'powerup-indicator';
      const icon = ap.type === 'turbo' ? '\u26A1' : '\u{1F9F2}';
      const label = ap.type === 'turbo' ? 'Turbo' : 'Magnet';
      const secsLeft = Math.ceil(ap.remaining);
      indicator.innerHTML =
        '<span class="powerup-icon">' + icon + '</span>' +
        '<span>' + label + ' ' + secsLeft + 's</span>';
      hudEl.appendChild(indicator);
    });
  }
}

function renderPowerUps() {
  const now = Date.now();
  state.powerUps.forEach(pu => {
    if (!pu.visible || pu.collected) return;

    const bob = Math.sin(now / 1000 * POWERUP_BOB_SPEED + pu.bobOffset) * POWERUP_BOB_AMP;
    const x   = pu.x;
    const y   = pu.y + bob;

    const isTurbo  = pu.type === 'turbo';
    const glowColor = isTurbo ? 'rgba(68,170,255,0.2)' : 'rgba(255,150,50,0.2)';
    const orbColor  = isTurbo ? '#44aaff'               : '#ff9632';
    const icon      = isTurbo ? '\u26A1'                : '\u{1F9F2}';

    ctx.save();

    ctx.globalAlpha = 0.2;
    ctx.fillStyle   = glowColor;
    ctx.beginPath();
    ctx.arc(x, y, 22, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.fillStyle   = orbColor;
    ctx.beginPath();
    ctx.arc(x, y, 10, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth   = 1.5;
    ctx.globalAlpha = 0.8;
    ctx.stroke();

    ctx.globalAlpha    = 1;
    ctx.font           = '10px sans-serif';
    ctx.textAlign      = 'center';
    ctx.textBaseline   = 'middle';
    ctx.fillStyle      = '#ffffff';
    ctx.fillText(icon, x, y);

    ctx.restore();
  });
}

// ===== HAZARD SYSTEM =====

function spawnHazards(defs) {
  defs.forEach((def, i) => {
    const hazard = {
      id:              def.id !== undefined ? def.id : (state.hazards.length + i),
      x:               def.x,
      y:               def.y,
      type:            def.type || 'recontamination_vent',
      respawnInterval: def.respawnInterval !== undefined ? def.respawnInterval : HAZARD_RESPAWN_INTERVAL,
      respawnRadius:   def.respawnRadius   !== undefined ? def.respawnRadius   : HAZARD_RESPAWN_RADIUS,
      respawnTimer:    def.respawnInterval !== undefined ? def.respawnInterval : HAZARD_RESPAWN_INTERVAL,
      puffTimer:       0,
    };
    state.hazards.push(hazard);
  });
}

function updateHazards(dt) {
  if (state.paused) return;

  const margin = 30;

  state.hazards.forEach(hazard => {
    if (hazard.type !== 'recontamination_vent') return;

    hazard.respawnTimer -= dt;
    if (hazard.puffTimer > 0) hazard.puffTimer -= dt;

    if (hazard.respawnTimer <= 0) {
      hazard.respawnTimer = hazard.respawnInterval;
      hazard.puffTimer    = 0.5;

      const angle    = Math.random() * Math.PI * 2;
      const distance = Math.random() * hazard.respawnRadius;
      const spawnX   = hazard.x + Math.cos(angle) * distance;
      const spawnY   = hazard.y + Math.sin(angle) * distance;

      if (
        spawnX >= margin && spawnX <= CANVAS_W - margin &&
        spawnY >= margin && spawnY <= CANVAS_H - margin
      ) {
        spawnDirt([{
          x:       spawnX,
          y:       spawnY,
          type:    'mud',
          areaId:  'main',
          radiusX: 14,
          radiusY: 10,
          maxHP:   40,
        }]);
      }
    }
  });
}

function renderHazards() {
  state.hazards.forEach(hazard => {
    if (hazard.type !== 'recontamination_vent') return;

    const x = hazard.x;
    const y = hazard.y;

    ctx.save();

    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath();
    ctx.ellipse(x, y, 18, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth   = 1.5;
    for (let gx = x - 12; gx <= x + 12; gx += 6) {
      ctx.beginPath();
      ctx.moveTo(gx, y - 8);
      ctx.lineTo(gx, y + 8);
      ctx.stroke();
    }

    if (hazard.puffTimer > 0) {
      const progress = 1 - hazard.puffTimer / 0.5;
      const puffRadius = 8 + progress * 20;
      const puffAlpha  = hazard.puffTimer / 0.5 * 0.5;
      ctx.globalAlpha  = puffAlpha;
      ctx.fillStyle    = '#7a5230';
      ctx.beginPath();
      ctx.arc(x, y, puffRadius, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha    = 1;
    ctx.font           = '12px sans-serif';
    ctx.textAlign      = 'center';
    ctx.textBaseline   = 'bottom';
    ctx.fillText('\u26A0\uFE0F', x, y - 12);

    ctx.restore();
  });
}

// ===== AUDIO ENGINE =====

function getAudioCtx() {
  try {
    if (!state.audioCtx) {
      state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (state.audioCtx.state === 'suspended') {
      state.audioCtx.resume();
    }
    return state.audioCtx;
  } catch (e) {
    return null;
  }
}

function playTone(freq, duration, type, volume) {
  type   = type   || 'sine';
  volume = volume !== undefined ? volume : 0.15;
  try {
    const actx  = getAudioCtx();
    if (!actx) return;
    const osc   = actx.createOscillator();
    const gain  = actx.createGain();
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.type      = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + duration);
    osc.start(actx.currentTime);
    osc.stop(actx.currentTime + duration + 0.01);
  } catch (e) {}
}

function playDirtClearPop() {
  const baseFreq = 600 + state.comboCount * 40;
  playTone(baseFreq,          0.12, 'sine',   0.12);
  playTone(baseFreq * 1.5,    0.08, 'sine',   0.08);
}

function playTargetChime() {
  playTone(880,  0.15, 'sine', 0.18);
  try {
    const actx = getAudioCtx();
    if (!actx) return;
    setTimeout(() => playTone(1100, 0.2, 'sine', 0.18), 100);
  } catch (e) {}
}

function playPowerUpCollect() {
  try {
    const actx = getAudioCtx();
    if (!actx) return;
    const osc  = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, actx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, actx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.2, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.3);
    osc.start(actx.currentTime);
    osc.stop(actx.currentTime + 0.31);
  } catch (e) {}
}

function playComboSound() {
  playTone(500 + state.comboCount * 60, 0.1, 'triangle', 0.14);
}

function playWinJingle() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    setTimeout(() => playTone(freq, 0.3, 'sine', 0.2), i * 120);
  });
}

function playFailSound() {
  playTone(400, 0.3, 'sawtooth', 0.15);
  setTimeout(() => playTone(300, 0.4, 'sawtooth', 0.15), 150);
}

function playTimerTick() {
  playTone(800, 0.05, 'square', 0.06);
}

let _lastTickSecond = -1;

function updateSpraySound() {
  try {
    const actx = getAudioCtx();
    if (!actx) return;

    const isGameplay = state.screen === 'gameplay' && !state.paused;
    const shouldPlay = isGameplay && state.isCleaning && state.waterCurrent > 0 && !state.isLockedRecharge;

    if (shouldPlay) {
      if (!state.sprayNode) {
        const bufferSize   = actx.sampleRate * 2;
        const noiseBuffer  = actx.createBuffer(1, bufferSize, actx.sampleRate);
        const output       = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          output[i] = Math.random() * 2 - 1;
        }
        const noiseSource  = actx.createBufferSource();
        noiseSource.buffer = noiseBuffer;
        noiseSource.loop   = true;

        const filter       = actx.createBiquadFilter();
        filter.type        = 'bandpass';
        filter.frequency.value = 3000;
        filter.Q.value     = 0.5;

        const gainNode     = actx.createGain();
        gainNode.gain.setValueAtTime(0, actx.currentTime);

        noiseSource.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(actx.destination);
        noiseSource.start();

        state.sprayNode = { source: noiseSource, gain: gainNode };
      }
      state.sprayNode.gain.gain.setTargetAtTime(0.04, actx.currentTime, 0.05);
    } else {
      if (state.sprayNode) {
        state.sprayNode.gain.gain.setTargetAtTime(0, actx.currentTime, 0.08);
      }
    }
  } catch (e) {}
}

function updateTimerTick() {
  if (state.timer > 10) {
    _lastTickSecond = -1;
    return;
  }
  const currentSecond = Math.floor(state.timer);
  if (currentSecond !== _lastTickSecond && currentSecond >= 0) {
    _lastTickSecond = currentSecond;
    playTimerTick();
  }
}

(function () {
  const initAudio = () => { getAudioCtx(); };
  document.addEventListener('click',      initAudio, { once: true });
  document.addEventListener('touchstart', initAudio, { once: true });
})();

// ===== COMBO UPDATE =====

function updateCombo(dt) {
  if (state.comboTimer > 0) {
    state.comboTimer -= dt;
    if (state.comboTimer <= 0) {
      state.comboTimer = 0;
      state.comboCount = 0;
    }
  }
}

// ===== PARTICLE UPDATE =====

function updateParticles(dt) {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.life -= dt;
    if (p.life <= 0) {
      state.particles.splice(i, 1);
      continue;
    }
    p.vx *= p.friction;
    p.vy *= p.friction;
    p.vy += p.gravity * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }
}

// ===== PARTICLE RENDERER =====

function renderParticles() {
  state.particles.forEach(p => {
    const lifeRatio = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = lifeRatio;

    if (p.type === 'ring') {
      const radius = p.size + (1 - lifeRatio) * 40;
      ctx.strokeStyle = p.color;
      ctx.lineWidth   = 2 * lifeRatio;
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.stroke();
    } else if (p.type === 'text') {
      ctx.font        = 'bold ' + p.size + 'px system-ui';
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle   = p.color;
      ctx.fillText(p.text, p.x, p.y);
    } else {
      const radius = p.shrink ? p.size * lifeRatio : p.size;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.1, radius), 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  });
}

// ===== PROPS RENDERER =====

function renderProps() {
  // Stepping stones adapted for portrait
  const stones = [
    {x:60, y:700}, {x:110, y:680}, {x:160, y:700},
    {x:380, y:700}, {x:400, y:670},
  ];
  for (const s of stones) {
    ctx.beginPath();
    ctx.ellipse(s.x, s.y, 12, 7, 0, 0, Math.PI*2);
    ctx.fillStyle = '#6a7a6a';
    ctx.fill();
    ctx.strokeStyle = '#5a6a5a';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Corner bushes
  const bushes = [
    {x:25, y:25}, {x:CANVAS_W-25, y:25},
    {x:25, y:CANVAS_H-25}, {x:CANVAS_W-25, y:CANVAS_H-25},
  ];
  for (const b of bushes) {
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, 22, 16, 0, 0, Math.PI*2);
    ctx.fillStyle = '#2a5a1a';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(b.x+6, b.y-4, 16, 10, 0, 0, Math.PI*2);
    ctx.fillStyle = '#3a6a2a';
    ctx.fill();
  }

  // Garden hose
  ctx.beginPath();
  ctx.moveTo(35, CANVAS_H-40);
  ctx.bezierCurveTo(55, CANVAS_H-80, 85, CANVAS_H-65, 70, CANVAS_H-50);
  ctx.strokeStyle = '#2a8a4a';
  ctx.lineWidth = 4;
  ctx.stroke();
}


// ===== OBJECTS SYSTEM =====

function spawnObjects(defs) {
  defs.forEach((def, i) => {
    const obj = {
      id:              def.id !== undefined ? def.id : (state.objects.length + i),
      x:               def.x,
      y:               def.y,
      type:            def.type || 'pot',
      maxHP:           def.maxHP !== undefined ? def.maxHP : 80,
      hp:              def.hp    !== undefined ? def.hp    : (def.maxHP !== undefined ? def.maxHP : 80),
      radiusX:         def.radiusX !== undefined ? def.radiusX : 20,
      radiusY:         def.radiusY !== undefined ? def.radiusY : 14,
      cleaned:         false,
      locked:          def.locked          || false,
      restoreRequired: def.restoreRequired || false,
      restoreReady:    def.restoreReady    || false,
      restored:        false,
    };
    state.objects.push(obj);
  });
}

function updateObjects(dt) {
  if (state.paused) return;
  if (!state.inputActive) return;
  if (state.waterCurrent <= 0 || state.isLockedRecharge) return; // No water or locked = no cleaning

  const aimX = state.aimX;
  const aimY = state.aimY;

  const hasTurbo  = state.activePowerUps.some(p => p.type === 'turbo');
  const powerMult = hasTurbo ? TURBO_POWER_MULT : 1.0;
  const radiusMult = hasTurbo ? TURBO_RADIUS_MULT : 1.0;

  const effectiveCleanPower = getEffectiveCleanPower();
  const effectiveCRX = getEffectiveCleanRadiusX();
  const effectiveCRY = getEffectiveCleanRadiusY();

  state.objects.forEach(obj => {
    if (obj.cleaned || obj.locked) return;
    if (obj.restoreRequired && !obj.restoreReady) return;

    const crX = effectiveCRX * radiusMult;
    const crY = effectiveCRY * radiusMult;

    const ed = ellipseDist(obj.x - aimX, obj.y - aimY, crX, crY);
    if (ed > 1) return;

    obj.hp -= effectiveCleanPower * powerMult * dt;
    state.isCleaning = true;

    if (obj.hp <= 0) {
      obj.hp      = 0;
      obj.cleaned = true;
      if (obj.restoreRequired) {
        obj.restored = true;
      }
      onObjectCleaned(obj);
    }
  });
}

function onObjectCleaned(obj) {
  spawnSparkleBurst(obj.x, obj.y);
  triggerShake(2);

  // Award gold based on object type
  if (obj.restoreRequired) {
    awardLevelGold(5, obj.x, obj.y); // Restore interaction: +5
  } else {
    awardLevelGold(3, obj.x, obj.y); // Target object cleaned: +3
  }

  state.targets.forEach(target => {
    let updated = false;
    if (target.type === 'clean_object' && target.objectType === obj.type) {
      target.current = (target.current || 0) + 1;
      updated = true;
    } else if (target.type === 'restore_object' && target.objectId === obj.id) {
      target.current = 1;
      updated = true;
    }
    if (updated) {
      onTargetProgress(target);
    }
  });

  checkWinCondition();
}

function onTargetProgress(target) {
  _hudBouncing.add(target.icon);

  let complete = false;
  if (target.type === 'restore_object') {
    complete = (target.current || 0) >= 1;
  } else if (target.threshold !== undefined) {
    complete = (target.current || 0) >= target.threshold;
  } else if (target.amount !== undefined) {
    complete = (target.current || 0) >= target.amount;
  }

  if (complete && !target.done) {
    target.done = true;
    playTargetChime();
  }
}

const _hudBouncing = new Set();

function updateHUD() {
  // Timer
  const timerEl = document.getElementById('hud-timer');
  if (timerEl) {
    const t   = Math.max(0, state.timer);
    const min = Math.floor(t / 60);
    const sec = Math.floor(t % 60);
    timerEl.textContent = min + ':' + (sec < 10 ? '0' : '') + sec;
    if (t < 10) {
      timerEl.classList.add('warning');
    } else {
      timerEl.classList.remove('warning');
    }
  }

  // Gold counter
  updateGoldHUD();

  // Targets
  const targetsEl = document.getElementById('hud-targets');
  if (!targetsEl) return;

  targetsEl.innerHTML = '';
  state.targets.forEach(target => {
    const card = document.createElement('div');
    const isBouncing = _hudBouncing.has(target.icon);
    card.className = 'hud-target-card' +
      (target.done ? ' done' : '') +
      (isBouncing  ? ' bounce' : '');
    card.setAttribute('data-target-id', target.icon);

    let progressText = '';
    if (target.type === 'clean_object' || target.type === 'clean_dirt') {
      progressText = (target.current || 0) + '/' + target.amount;
    } else if (target.type === 'clean_area') {
      const pct    = Math.round((target.current || 0) * 100);
      const thresh = Math.round((target.threshold || 0) * 100);
      progressText = pct + '%/' + thresh + '%';
    } else if (target.type === 'restore_object') {
      progressText = (target.current || 0) >= 1 ? '\u2713' : '\u25CB';
    }

    card.innerHTML =
      '<span class="hud-target-icon">' + target.icon + '</span>' +
      '<span class="hud-target-count">' + progressText + '</span>';

    if (isBouncing) {
      card.addEventListener('animationend', () => {
        _hudBouncing.delete(target.icon);
      }, { once: true });
    }

    targetsEl.appendChild(card);
  });
}

function updateTimer(dt) {
  if (state.paused) return;
  state.timer        -= dt;
  state.timerElapsed += dt;
  if (state.timer <= 0) {
    state.timer = 0;
    onLevelFail();
  }
}

function checkWinCondition() {
  if (state.won || state.paused) return;
  if (state.screen !== 'gameplay') return;
  if (state.targets.length === 0) return;
  const allDone = state.targets.every(t => t.done);
  if (allDone) {
    onLevelWin();
  }
}

// ===== GOLD SYSTEM (v3: in-level earning with floating feedback) =====

function awardLevelGold(amount, worldX, worldY) {
  state.levelGold += amount;
  updateGoldHUD();

  // Spawn floating gold text
  spawnParticle({
    x:       worldX + randRange(-10, 10),
    y:       worldY - 10,
    vx:      randRange(-8, 8),
    vy:      -50,
    life:    1.0,
    size:    amount >= 3 ? 16 : 13,
    color:   'rgba(255,204,50,0.95)',
    type:    'text',
    text:    '+' + amount,
    shrink:  false,
    gravity: -10,
    friction: 0.98,
  });

  // Pulse the gold HUD counter
  const valEl = document.getElementById('hud-gold-value');
  if (valEl) {
    valEl.classList.remove('pulse');
    void valEl.offsetWidth; // reflow to restart animation
    valEl.classList.add('pulse');
  }
}

function updateGoldHUD() {
  const valEl = document.getElementById('hud-gold-value');
  if (valEl) {
    valEl.textContent = state.levelGold;
  }
}

// ===== COIN REWARD CALCULATION =====

function calculateLevelReward() {
  // In v3, the in-level gold IS the reward
  return state.levelGold;
}

function onLevelWin() {
  if (state.won) return;
  state.won      = true;
  state.timeLeft = state.timer;

  const t = state.timeLeft;
  if      (t >= 10) state.stars = 3;
  else if (t >=  5) state.stars = 2;
  else              state.stars = 1;

  // In v3: the in-level gold IS the reward
  state.coinsEarnedThisLevel = state.levelGold;
  progression.washCoins += state.levelGold;

  // Update campaign progress
  const levelNum = LEVELS[state.levelIndex] ? LEVELS[state.levelIndex].levelNumber : 1;
  if (levelNum > progression.campaignLevel) {
    progression.campaignLevel = levelNum;
  }

  playWinJingle();
  showScreen('result');
}

function onLevelFail() {
  if (state.won) return;
  if (state.screen !== 'gameplay') return;
  state.won = false;
  // On fail, player keeps some gold earned (half, rounded down)
  const partialGold = Math.floor(state.levelGold * 0.5);
  state.coinsEarnedThisLevel = partialGold;
  progression.washCoins += partialGold;
  playFailSound();
  showScreen('result');
}

// ===== COLOR UTILITY =====

function lerpColor(c1, c2, t) {
  const r1 = parseInt(c1.slice(1, 3), 16);
  const g1 = parseInt(c1.slice(3, 5), 16);
  const b1 = parseInt(c1.slice(5, 7), 16);
  const r2 = parseInt(c2.slice(1, 3), 16);
  const g2 = parseInt(c2.slice(3, 5), 16);
  const b2 = parseInt(c2.slice(5, 7), 16);
  const r  = Math.round(r1 + (r2 - r1) * t);
  const g  = Math.round(g1 + (g2 - g1) * t);
  const b  = Math.round(b1 + (b2 - b1) * t);
  return '#' +
    (r < 16 ? '0' : '') + r.toString(16) +
    (g < 16 ? '0' : '') + g.toString(16) +
    (b < 16 ? '0' : '') + b.toString(16);
}

// ===== OBJECTS RENDERER =====

function renderObjects() {
  state.objects.forEach(obj => {
    const cleanRatio = 1 - (obj.hp / obj.maxHP);

    if (obj.type === 'pot') {
      renderPot(obj, cleanRatio);
    } else if (obj.type === 'bench') {
      renderBench(obj, cleanRatio);
    } else if (obj.type === 'birdbath') {
      renderBirdbath(obj, cleanRatio);
    }
  });
}

function renderPot(obj, cleanRatio) {
  const x = obj.x;
  const y = obj.y;

  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.fillStyle   = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(x + 3, y + 22, 16, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const dirtyPot   = '#7a5238';
  const cleanPot   = '#c46a2a';
  const potColor   = lerpColor(dirtyPot, cleanPot, cleanRatio);
  const potDarkColor = lerpColor('#5a3a20', '#a04e18', cleanRatio);

  ctx.fillStyle = potDarkColor;
  ctx.beginPath();
  ctx.moveTo(x - 14, y + 6);
  ctx.lineTo(x + 14, y + 6);
  ctx.lineTo(x + 10, y + 22);
  ctx.lineTo(x - 10, y + 22);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = potColor;
  ctx.beginPath();
  ctx.moveTo(x - 14, y + 6);
  ctx.lineTo(x + 14, y + 6);
  ctx.lineTo(x + 12, y - 6);
  ctx.lineTo(x - 12, y - 6);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = lerpColor('#8a6248', '#d47a3a', cleanRatio);
  ctx.beginPath();
  ctx.moveTo(x - 14, y + 6);
  ctx.lineTo(x + 14, y + 6);
  ctx.lineTo(x + 15, y + 2);
  ctx.lineTo(x - 15, y + 2);
  ctx.closePath();
  ctx.fill();

  if (cleanRatio > 0) {
    ctx.save();
    ctx.globalAlpha = cleanRatio;
    const leafColor = lerpColor('#3a5a1a', '#5a9a2a', cleanRatio);
    ctx.fillStyle = leafColor;
    ctx.beginPath();
    ctx.ellipse(x, y - 10, 11 * cleanRatio, 9 * cleanRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x - 9, y - 7, 8 * cleanRatio, 6 * cleanRatio, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 9, y - 7, 8 * cleanRatio, 6 * cleanRatio, 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  if (obj.cleaned) {
    const pulse = 0.6 + 0.4 * Math.sin(Date.now() * 0.006);
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.fillStyle   = '#ffffaa';
    ctx.beginPath();
    ctx.arc(x, y - 18, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  if (!obj.cleaned) {
    const dirtyAlpha = (1 - cleanRatio) * 0.55;
    ctx.save();
    ctx.globalAlpha = dirtyAlpha;
    ctx.fillStyle   = '#5a3a18';
    ctx.beginPath();
    ctx.ellipse(x, y + 8, obj.radiusX, obj.radiusY + 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function renderBench(obj, cleanRatio) {
  const x = obj.x;
  const y = obj.y;

  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.fillStyle   = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(x, y + 18, 26, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const dirtyWood  = '#4a3020';
  const cleanWood  = '#c8843a';
  const woodColor  = lerpColor(dirtyWood, cleanWood, cleanRatio);
  const darkWood   = lerpColor('#2a1810', '#8a5428', cleanRatio);

  ctx.fillStyle = darkWood;
  ctx.fillRect(x - 22, y + 6,  5, 14);
  ctx.fillRect(x + 17, y + 6,  5, 14);

  ctx.fillStyle = woodColor;
  ctx.fillRect(x - 24, y - 2, 48, 8);

  ctx.fillStyle = darkWood;
  ctx.fillRect(x - 24, y + 6,  48, 4);

  if (!obj.cleaned) {
    const dirtyAlpha = (1 - cleanRatio) * 0.5;
    ctx.save();
    ctx.globalAlpha = dirtyAlpha;
    ctx.fillStyle   = '#3a2808';
    ctx.beginPath();
    ctx.ellipse(x, y + 4, obj.radiusX, obj.radiusY, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function renderBirdbath(obj, cleanRatio) {
  const x = obj.x;
  const y = obj.y;

  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.fillStyle   = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(x + 2, y + 24, 14, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const dirtyStone  = '#6a6a5a';
  const cleanStone  = '#b0b0a0';
  const stoneColor  = lerpColor(dirtyStone, cleanStone, cleanRatio);
  const darkStone   = lerpColor('#3a3a2a', '#808070', cleanRatio);

  ctx.fillStyle = darkStone;
  ctx.fillRect(x - 5, y + 4, 10, 20);

  ctx.fillStyle = stoneColor;
  ctx.beginPath();
  ctx.ellipse(x, y, 18, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = darkStone;
  ctx.beginPath();
  ctx.ellipse(x, y, 18, 10, 0, 0, Math.PI * 2);
  ctx.stroke();

  if (obj.restored) {
    const wave = Math.sin(Date.now() * 0.004) * 2;
    ctx.save();
    ctx.globalAlpha = 0.75;
    ctx.fillStyle   = '#44aaee';
    ctx.beginPath();
    ctx.ellipse(x, y + wave * 0.3, 14, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.4;
    ctx.fillStyle   = '#aaddff';
    ctx.beginPath();
    ctx.ellipse(x - 3, y - 2 + wave * 0.5, 6, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  if (!obj.cleaned) {
    const dirtyAlpha = (1 - cleanRatio) * 0.5;
    ctx.save();
    ctx.globalAlpha = dirtyAlpha;
    ctx.fillStyle   = '#4a3a18';
    ctx.beginPath();
    ctx.ellipse(x, y, obj.radiusX, obj.radiusY, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}
